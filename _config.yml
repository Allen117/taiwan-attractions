title: 裕仁去過哪
description: 記錄走過的足跡 — 台灣、日本、馬來西亞
lang: zh-TW

collections:
  attractions:
    output: true
    permalink: /attractions/:name/
  counties:
    output: true
    permalink: /counties/:name/
  jp_regions:
    output: true
    permalink: /jp-regions/:name/
  my_states:
    output: true
    permalink: /my-states/:name/

defaults:
  - scope:
      path: ""
      type: attractions
    values:
      layout: attraction
  - scope:
      path: ""
      type: counties
    values:
      layout: county
  - scope:
      path: ""
      type: jp_regions
    values:
      layout: jp_region
  - scope:
      path: ""
      type: my_states
    values:
      layout: my_state

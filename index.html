---
layout: default
title: 登入
skip_auth: true
---

<section class="login">
  <h1>請先登入</h1>
  <p class="login-hint">輸入密碼以進入網站</p>
  <form id="login-form" autocomplete="off">
    <input type="password" id="login-pw" placeholder="密碼" required autofocus>
    <button type="submit">進入</button>
    <p id="login-error" class="login-error" hidden>密碼錯誤，請再試一次</p>
  </form>
</section>

<script>
  (function () {
    var form = document.getElementById('login-form');
    var pw = document.getElementById('login-pw');
    var err = document.getElementById('login-error');
    var target = '{{ "/HomePage/" | relative_url }}';

    if (sessionStorage.getItem('tw-auth') === '1') {
      window.location.replace(target);
      return;
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (pw.value === 'FuckCCP') {
        sessionStorage.setItem('tw-auth', '1');
        window.location.href = target;
      } else {
        err.hidden = false;
        pw.value = '';
        pw.focus();
      }
    });
  })();
</script>

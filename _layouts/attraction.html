---
layout: default
---

<article class="attraction">
  <h1>{{ page.title }}</h1>

  {% if page.location %}
    <p class="meta">📍 {{ page.location }}</p>
  {% endif %}

  {% if page.cover %}
    <img src="{{ page.cover | relative_url }}" alt="{{ page.title }}" class="cover">
  {% endif %}

  <div class="content">
    {{ content }}
  </div>

  <p><a href="{{ '/' | relative_url }}">← 回到景點列表</a></p>
</article>
